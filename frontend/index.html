<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <h1>My Portfolio</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a></li>
                <li><a href="#" id="logoutBtn" style="display:none;">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>Welcome to My Portfolio</h2>
            <p>I'm a developer sharing thoughts and projects.</p>
        </section>
        <section class="featured-posts" id="featuredPosts">
            <h3>Latest Blog Posts</h3>
            <div id="postsContainer">Loading...</div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Load featured posts on homepage
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('postsContainer');
            try {
                const API_URL = window.API_BASE || 'http://localhost:5000';
                const res = await fetch(`${API_URL}/api/blog/posts`);
                const posts = await res.json();
                if (posts.length === 0) {
                    container.innerHTML = '<p>No posts yet.</p>';
                    return;
                }
                container.innerHTML = posts.slice(0, 3).map(post => `
                    <article class="post-card">
                        <h4><a href="blog.html?slug=${post.slug}">${post.title}</a></h4>
                        <p>${post.excerpt || post.content.substring(0, 150)}...</p>
                        <small>${new Date(post.created_at).toLocaleDateString()}</small>
                    </article>
                `).join('');
            } catch (err) {
                container.innerHTML = '<p>Error loading posts.</p>';
                console.error(err);
            }
        });
    </script>
</body>
</html>
