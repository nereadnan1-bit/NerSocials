<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NerSocials</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <h1><a href="index.html">NerSocials</a></h1>
            <ul>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Register</h2>
        <form id="registerForm">
            <label>Email: <input type="email" id="email" required></label>
            <label>Password: <input type="password" id="password" required minlength="6"></label>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <div id="message"></div>
    </main>
    <script src="js/main.js"></script>
    <script>
        const API_BASE = window.API_BASE;
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            msg.textContent = 'Registering...';
            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = 'Registration successful! Check your email to confirm, then login.';
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    msg.textContent = data.error || 'Registration failed';
                }
            } catch (err) {
                msg.textContent = 'Network error';
            }
        });
    </script>
</body>
</html>
