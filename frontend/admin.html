<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NerSocials</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <h1><a href="index.html">NerSocials</a></h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Admin Panel - Manage Blog Posts</h2>
        <button id="newPostBtn">+ New Post</button>
        <div id="postFormContainer" style="display:none;">
            <h3 id="formTitle">Create New Post</h3>
            <form id="postForm">
                <input type="hidden" id="postSlug">
                <label>Title: <input type="text" id="title" required></label>
                <label>Slug: <input type="text" id="slug" required pattern="[a-z0-9-]+"></label>
                <label>Excerpt: <input type="text" id="excerpt"></label>
                <label>Content (Markdown): <textarea id="content" rows="10" required></textarea></label>
                <label>Published: <input type="checkbox" id="published"></label>
                <button type="submit">Save</button>
                <button type="button" id="cancelForm">Cancel</button>
            </form>
        </div>
        <hr>
        <h3>All Posts</h3>
        <table id="postsTable">
            <thead>
                <tr><th>Title</th><th>Slug</th><th>Published</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>
    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Ensure API_BASE is available
        const API_BASE = window.API_BASE;
        // Admin page logic is in admin.js but uses API_BASE from main.js
    </script>
</body>
</html>
